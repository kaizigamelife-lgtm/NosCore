version: '3.8'

services:
  db:
    container_name: noscore-db
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=noscore
    ports:
      - 5432:5432
    volumes:
      - ./postgres:/var/lib/postgresql/data
    networks:
      - noscore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d noscore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  reverse-proxy:
    container_name: noscore-reverse-proxy
    image: noscoreio/noscore.reverseproxy:latest
    restart: unless-stopped
    ports:
      - 4000:4000
      - 1337:1337
    expose:
      - 4000
      - 1337
    networks:
      - noscore-network

  master:
    container_name: noscore-master
    environment:
      - PORT=5000
      - DB_HOST=db
      - WEBAPI_HOST=http://master
    build:
      context: ./
      dockerfile: deploy/Dockerfile-master
    restart: unless-stopped
    ports:
      - 5000:5000
    expose:
      - 5432
    networks:
      - noscore-network
    volumes:
      - ./build/net10.0/linux-musl-x64:/app/build/net10.0
      - ./configuration/:/app/build/configuration
    depends_on:
      db:
        condition: service_healthy

  world:
    container_name: noscore-world
    environment:
      - WEBAPI_PORT=5001
      - WEBAPI_HOST=http://world
      - WORLD_PORT=1337
      - MASTER_HOST=http://master
      - DB_HOST=db
      - HOST=127.0.0.1
    build:
      context: ./
      dockerfile: deploy/Dockerfile-world
    restart: unless-stopped
    ports:
      - 5001:5001
      - 1337:1337
    expose:
      - 5432
    networks:
      - noscore-network
    volumes:
      - ./build/net10.0/linux-musl-x64:/app/build/net10.0
      - ./configuration/:/app/build/configuration
    depends_on:
      db:
        condition: service_healthy

  login:
    container_name: noscore-login
    environment:
      - LOGIN_PORT=4000
      - MASTER_HOST=http://master
      - DB_HOST=db
      - HOST=127.0.0.1
    build:
      context: ./
      dockerfile: deploy/Dockerfile-login
    restart: unless-stopped
    ports:
      - 4000:4000
    expose:
      - 5432
    networks:
      - noscore-network
    volumes:
      - ./build/net10.0/linux-musl-x64:/app/build/net10.0
      - ./configuration/:/app/build/configuration
    depends_on:
      db:
        condition: service_healthy

networks:
  noscore-network:
    driver: bridge
